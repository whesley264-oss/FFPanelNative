name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.5" || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125" || true

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/26.1.10909125" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --warning-mode all

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon || echo "Release build skipped (no keystore)"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
        if: always()

      - name: List generated APKs
        run: |
          echo "=== Generated APKs ==="
          find app/build/outputs/apk -name "*.apk" -type f -exec ls -lh {} \;

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app-debug.apk
          name: FF Panel Pro v2.0
          tag_name: v2.0
          body: |
            ## 🎮 FF Panel Pro v2.0
            
            ### Funcionalidades:
            - ✅ AIM ASSIST
            - ✅ NO RECOIL  
            - ✅ SPEED HACK
            - ✅ FLY MOD
            - ✅ ESP WALLHACK (6 tipos)
            
            ### ESP Types:
            - 📦 Box ESP
            - 📏 Line ESP
            - 💀 Skeleton ESP
            - 🏷️ Name ESP
            - ✨ Glow/Highlight
            - ◢ Cornered Box
            
            ### Build Info:
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
